# mise.toml - Task runner and tool version manager
# https://mise.jdx.dev/
# This replaces package.json scripts with mise tasks for better tool version management

[settings]
color = true
experimental = true
quiet = true

# Let mise read the Node version from package.json's engines field
idiomatic_version_file_enable_tools = ["node"]
python.uv_venv_auto = "create|source"

[tools]
# Node version is read from package.json engines field via idiomatic_version_file
# bun and gh are provisioned by mise directly
bun = "1.3"
gh = "2.66"

# Cargo Tools
"cargo:yamllint-rs" = "latest"

# PIPX
"pipx:yamllint" = "1.38.0"

[env]
ARCH = "{{exec(command='uname -m')}}"
GITHUB_TOKEN = "{{exec(command='gh auth token')}}"
PROJECT_NAME = "{{exec(command='basename $(pwd)')}}"
SCRIPTS = "{{exec(command='pwd')}}/.github/scripts"
PYTHON_SCRIPTS_DIR = "$SCRIPTS/python"
TYPESCRIPT_SCRIPTS_DIR = "./scripts"

[hooks]
enter = { task = "setup" }
postinstall = '''
echo "Installed: $MISE_INSTALLED_TOOLS"
'''

[tasks]
# === Tool Installation ===
[tasks.install]
description = "Install all mise-managed tools"
alias = ["setup", "install:tools"]
depends_post = ["install-additional-deps"]
shell = "bash -c"
run = '''
echo "Installing all managed mise tools"
mise install
'''

[tasks.lefthook]
description = "Install the git hooks managed by lefthook"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = '''
echo "Installing the git hooks managed by lefthook"
lefthook install
'''

[tasks.install-additional-deps]
description = "Install Project Dependencies"
depends_post = ["lefthook"]
run = '''
echo "installing project '$PROJECT_NAME' dependencies for architecture '$ARCH'"
'''

# === Testing ===
[tasks.test]
description = "Run the test suite with bun (workaround for bun exit code bug)"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "./.github/scripts/bash/bun-test.sh"

[tasks."test:coverage"]
description = "Run the test suite with coverage report"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "./.github/scripts/bash/bun-test.sh --coverage"

[tasks."test:watch"]
description = "Run the test suite in watch mode"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun test --watch"

[tasks."test:mutation"]
description = "Run mutation testing with stryker"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "stryker run"

# === Building ===
[tasks.build]
description = "Build both CLI and GitHub Action bundles"
alias = []
depends = ["build:cli", "build:action"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks."build:cli"]
description = "Build CLI bundle for npx distribution"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun build src/cli-entry.ts --outdir dist --target node --external none"

[tasks."build:action"]
description = "Build GitHub Action bundle for node20 runtime"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun build src/cli.ts --outdir dist/action --target node --external none --outfile index.js"

# === Linting & Formatting ===
[tasks.lint]
description = "Run all linting (ESLint + Prettier check)"
alias = []
depends = ["eslint:lint", "prettier:format"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks."lint:fix"]
description = "Fix all linting issues (ESLint fix + Prettier write)"
alias = []
depends = ["eslint:lint:fix", "prettier:format:fix"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks."eslint:lint"]
description = "Run ESLint with zero warnings allowed"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "eslint --max-warnings 0 --ignore-pattern dist/ ."

[tasks."eslint:lint:fix"]
description = "Run ESLint with auto-fix"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "eslint --fix --max-warnings 0 --ignore-pattern dist/ ."

[tasks."prettier:format"]
description = "Check code formatting with Prettier"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "prettier --check ."

[tasks."prettier:format:fix"]
description = "Format code with Prettier (write changes)"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "prettier --write ."

[tasks."fix:all"]
description = "Run all auto-fixes (ESLint + Prettier)"
alias = []
depends = ["eslint:lint:fix", "prettier:format:fix"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks.actionlint]
alias = "al"
description = "Lint GitHub Actions workflows with actionlint (config in .github/actionlint.yaml); pass paths (e.g. lefthook {staged_files}) or default to all workflows"
run = '''
#!/usr/bin/env bash

set -eou pipefail

# actionlint auto-discovers .github/actionlint.yaml. With no paths it lints
# every workflow under .github/workflows; forward staged paths when given.
# Variadic args arrive shell-escaped — eval into an array so paths survive.
eval "paths=(${usage_paths:-})"
actionlint "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="workflow files to lint; defaults to every workflow under .github/workflows when omitted"'

[tasks.yamllint]
alias = ["yl"]
description = "Lint YAML with yamllint; pass paths (e.g. lefthook {staged_files}) or default to the whole repo"
run = '''
#!/usr/bin/env bash

set -eou pipefail

# Variadic args arrive as a shell-escaped string; eval into an array so paths
# with spaces survive. Fall back to the whole repo when no paths are passed.
eval "paths=(${usage_paths:-.})"
yamllint "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to lint; defaults to the whole repo when omitted"'

[tasks."yamllint:fix"]
alias = ["ylf"]
description = "Lint YAML with yamllint-rs; pass paths (e.g. lefthook {staged_files}) or default to the whole repo"
run = '''
#!/usr/bin/env bash

set -eou pipefail

# Safely check if the usage_paths variable is set and non-empty.
# ${usage_paths:-} prevents "unbound variable" errors under set -u.
if [ -n "${usage_paths:-}" ]; then
  # Note: To handle paths with spaces safely when using 'var=true',
  # mise recommends using eval to parse the shell-escaped string into an array.
  eval "paths=($usage_paths:-.)"
else
  mapfile -t paths < <(yamllint --list-files .)
fi

npx prettier --write "${paths[@]}"

# Run the linter
yamllint-rs --config .yamllint.yml --fix "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to lint; defaults to the whole repo when omitted"'

# === File Hygiene ===
[tasks.hygiene]
alias = ["hy"]
description = "Run portable file-hygiene checks (the pre-commit-hooks replacement: large files, merge markers, case/symlink/exec/TOML/JSON, whitespace, EOF, line endings, submodule). Defaults to all tracked files"
run = '''
#!/usr/bin/env bash

set -eou pipefail

# Array-length syntax is avoided here on purpose: mise renders run scripts via
# Tera, which treats brace-hash as a comment opener. Test the raw variadic.
eval "paths=(${usage_paths:-})"
if [ -z "${usage_paths:-}" ]; then
    # bash 3.2-safe (macOS): no mapfile. One tracked path per line from git.
    while IFS= read -r f; do paths+=("$f"); done < <(git ls-files)
fi
python3 $PYTHON_SCRIPTS_DIR/file-hygiene.py "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="paths to check; defaults to all git-tracked files"'

[tasks.hygiene-fix]
alias = ["hyf"]
description = "Apply file-hygiene fixes in place (trailing whitespace, final newline, CRLF→LF); defaults to all tracked files"
run = '''
#!/usr/bin/env bash

set -eou pipefail

eval "paths=(${usage_paths:-})"
if [ -z "${usage_paths:-}" ]; then
    while IFS= read -r f; do paths+=("$f"); done < <(git ls-files)
fi
python3 $PYTHON_SCRIPTS_DIR/file-hygiene.py --fix "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="paths to fix; defaults to all git-tracked files"'

# === Type Checking ===
[tasks.typecheck]
description = "Run TypeScript type checking"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "tsc -p tsconfig.test.json --noEmit"

[tasks."typecheck:watch"]
description = "Run TypeScript type checking in watch mode"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "tsc -p tsconfig.test.json --noEmit --watch"

# === Dependencies ===
[tasks.deps]
description = "Update dependencies and reinstall"
alias = []
depends = ["deps:update"]
depends_post = []
shell = "bash -c"
run = "bun install"

[tasks."deps:update"]
description = "Update dependencies to latest minor versions"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bunx --bun npm-check-updates -u --target minor"

[tasks."deps:check"]
description = "Check for available dependency updates"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bunx --bun npm-check-updates --target minor"

[tasks."deps:latest"]
description = "Update dependencies to latest versions"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bunx --bun npm-check-updates -u --target latest && bun install"

# === Config & Release ===
[tasks."config:sync:check"]
description = "Check if config files are in sync"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun $TYPESCRIPT_SCRIPTS_DIR/check-config-sync.ts"

[tasks.release]
description = "Publish new release via changesets"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "changeset publish"

[tasks.version]
description = "Version packages via changesets"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "changeset version"

# === CI / Development ===
[tasks.dev]
description = "Run development checks (test + lint + typecheck)"
alias = []
depends = ["test", "lint", "typecheck"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks.ci]
description = "Run full CI pipeline"
alias = []
depends = ["test", "lint", "typecheck", "build"]
depends_post = []
shell = "bash -c"
run = "true"

# === GitHub Token Helpers ===
[tasks."gh:token"]
description = "Get GitHub token from gh auth"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "gh auth token"

[tasks."gh:token:set"]
description = "Set GITHUB_TOKEN from gh auth for current shell"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "export GITHUB_TOKEN=$(gh auth token) && echo 'GITHUB_TOKEN set from gh auth'"

# === CLI Shortcuts ===
[tasks.cli]
description = "Run CLI from built dist bundle"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "node dist/cli-entry.js"

[tasks."cli:help"]
description = "Show CLI help"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "node dist/cli-entry.js --help"

[tasks."cli:dry-run"]
description = "Run CLI in dry-run mode (default)"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "node dist/cli-entry.js"

[tasks."cli:write"]
description = "Run CLI and write changes to workflow files"
alias = []
depends = ["gh:token:set"]
depends_post = []
shell = "bash -c"
run = """
#!/usr/bin/env bash

set -eou pipefail

node dist/cli-entry.js --config update-actions-versions.toml --write
"""

[tasks."cli:major"]
description = "Run CLI with major version bumps applied"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "node dist/cli-entry.js --config update-actions-versions.toml --write --apply-major"

[tasks."cli:inline"]
description = "Run CLI with inline config example"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "node dist/cli-entry.js --inline-config '{\"maxConcurrentApi\": 2}'"

# Development shortcuts
[tasks."cli:dev"]
description = "Run CLI from source with bun (no build needed)"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun src/cli-entry.ts"

[tasks."cli:dev:help"]
description = "Show CLI help from source"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "bun src/cli-entry.ts --help"

# === Doctor / Diagnostics ===
[tasks.doctor]
description = "Diagnose toolchain and project state"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = """
#!/usr/bin/env bash
set -eou pipefail

echo "=== Platform: $(uname -s) ($(uname -m)) ==="

echo "-- Node toolchain (package.json engines) --"
v() {
    label="$1"
    shift
    out="$("$@" 2>/dev/null | head -1)"
    printf "  %-20s : %s\n" "$label" "${out:-MISSING}"
}

v node node --version
v bun bun --version
v npm npm --version

echo "-- GitHub CLI --"
v gh gh --version

echo "-- Mise --"
v mise mise --version

echo "-- Project state --"
printf "  %-20s : %s\n" "GITHUB_TOKEN" "${GITHUB_TOKEN:-NOT SET (run 'mise run gh:token:set')}"
"""

# === Commitlint ===
[tasks.commitlint]
description = "Lint commit message against conventional commits"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = """
#!/usr/bin/env bash
set -eou pipefail

# Check if commitlint is installed
if ! command -v commitlint &> /dev/null; then
    echo "commitlint not found. Installing..."
    bunx --bun npm install -g @commitlint/cli @commitlint/config-conventional
fi

# If commit message file is provided as arg, use it
if [ $# -gt 0 ]; then
    commitlint --edit "$1"
else
    # Read from stdin (for git commit-msg hook)
    cat | commitlint
fi
"""

# === Commitlint Config ===
[tasks."commitlint:config"]
description = "Generate commitlint config from commit-types.toml"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "npx @commitlint/config-conventional > commitlint.config.js"
